# Pre-commit hooks: fast, local, matching what CI enforces.
# Install with: uv tool run pre-commit install   (or `make setup`)
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # The constitutional documents (docs/NN_*.md) are byte-stable: hooks
      # never rewrite them — they change only through the amendment procedure.
      - id: trailing-whitespace
        exclude: ^docs/\d{2}_.*\.md$
      - id: end-of-file-fixer
        exclude: ^docs/\d{2}_.*\.md$
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff
        args: [--fix]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  - repo: local
    hooks:
      - id: prettier-frontend
        name: prettier (frontend)
        entry: bash -c 'cd frontend && npx prettier --check "src/**/*.{ts,tsx,css}"'
        language: system
        files: ^frontend/src/.*\.(ts|tsx|css)$
        pass_filenames: false
